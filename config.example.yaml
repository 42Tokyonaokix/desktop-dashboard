# 位置情報
location:
  latitude: 35.6762
  longitude: 139.6503

# 更新設定
check_interval_min: 10

# オーバーレイ設定
overlay:
  position: bottom_right
  opacity: 0.7
  font_size: 48

# APIキー
unsplash:
  access_key: "YOUR API KEY HERE"

yahoo:
  client_id: ""

# Claude API（励ましコメント生成用）
claude:
  api_key: ""
  model: "claude-haiku-4-5-20251001"

# キャッシュ設定
cache:
  max_images: 50

# Obsidian連携設定
obsidian:
  vault_dir: ""
  tasks:
    max_items: 8
    status: "todo"
    priority: "high"
  motivation_file: ""
  check_interval_min: 5

# ダッシュボード設定
dashboard:
  width: 1500
  height: 1000
  sections:
    - weather
    - tasks
    - motivation
  section_weights: [30, 40, 30]
  card_opacity: 0.6
  font_size: 36
